# ---------------------------------------------------------------
# Render Blueprint - Laravel + Aiven MySQL
# Docs: https://render.com/docs/blueprint-spec
# ---------------------------------------------------------------
# Only 3 values need to be entered manually in Render dashboard:
#   1. APP_KEY          - generate with: php artisan key:generate --show
#   2. DB_PASSWORD      - from Aiven console
#   3. DB_SSL_CA_BASE64 - base64 of ca.pem from Aiven console
# ---------------------------------------------------------------

services:
  - type: web
    name: capstone-lms
    env: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    branch: main

    healthCheckPath: /

    envVars:
      # ---- App ----
      - key: APP_NAME
        value: "Text To Speech"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://capstone-lms.onrender.com
      - key: APP_KEY
        sync: false   # SECRET - enter manually in Render dashboard

      # ---- Logging ----
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_DEPRECATIONS_CHANNEL
        value: "null"
      - key: LOG_LEVEL
        value: error

      # ---- Aiven MySQL Database ----
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: mysql-242855ec-minsu-fbd6.f.aivencloud.com
      - key: DB_PORT
        value: "12875"
      - key: DB_DATABASE
        value: capstone_lms
      - key: DB_USERNAME
        value: avnadmin
      - key: DB_PASSWORD
        sync: false   # SECRET - enter manually in Render dashboard

      # ---- Aiven SSL Certificate ----
      # Download ca.pem from Aiven Console → Service → Overview
      # Encode with PowerShell:
      #   [Convert]::ToBase64String([IO.File]::ReadAllBytes("C:\path\to\ca.pem"))
      # Paste the single-line base64 output as the value in Render dashboard
      - key: DB_SSL_CA_BASE64
        sync: false   # SECRET - enter manually in Render dashboard

      # ---- Cache / Session / Queue ----
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_LIFETIME
        value: "120"
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: r2   # Use Cloudflare R2 for persistent file storage

      # ---- Cloudflare R2 Persistent Storage (FREE) ----
      # Setup: https://dash.cloudflare.com → R2 → Create Bucket
      # Then: R2 → Manage R2 API Tokens → Create Token (read+write)
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET
        sync: false
      # Endpoint format: https://<ACCOUNT_ID>.r2.cloudflarestorage.com
      - key: CLOUDFLARE_R2_ENDPOINT
        sync: false
      # Public URL for bucket (enable R2 Public Access or use custom domain)
      # e.g. https://pub-xxxx.r2.dev  OR  https://your-domain.com/bucket
      - key: CLOUDFLARE_R2_URL
        sync: false

      # ---- Broadcasting ----
      - key: BROADCAST_DRIVER
        value: log

      # ---- Admin Seeder ----
      - key: LMS_ADMIN_EMAIL
        value: admin@lms.local
      - key: LMS_ADMIN_PASSWORD
        value: password

      # ---- VoiceRSS TTS API ----
      - key: VOICERSS_API_KEY
        value: ""

      # ---- Mail ----
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: mailpit
      - key: MAIL_PORT
        value: "1025"
      - key: MAIL_USERNAME
        value: "null"
      - key: MAIL_PASSWORD
        value: "null"
      - key: MAIL_ENCRYPTION
        value: "null"
      - key: MAIL_FROM_ADDRESS
        value: hello@example.com
      - key: MAIL_FROM_NAME
        value: "Text To Speech"

      # ---- Pusher (not used, set to empty) ----
      - key: PUSHER_APP_ID
        value: ""
      - key: PUSHER_APP_KEY
        value: ""
      - key: PUSHER_APP_SECRET
        value: ""
      - key: PUSHER_HOST
        value: ""
      - key: PUSHER_PORT
        value: "443"
      - key: PUSHER_SCHEME
        value: https
      - key: PUSHER_APP_CLUSTER
        value: mt1

      # ---- Vite ----
      - key: VITE_APP_NAME
        value: "Text To Speech"
